<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="Container">
        <div class="loginContainer">
            <div class="login-logo">
                <a class="Logo">
                    <img src="image/logo.png" alt="Logo" width="355" height="80">
                </a>
                <h1 style="font-family: sans-serif; font-size: 30px; ">Login</h1>
                <p style="font-family: sans-serif; font-size: 15px; margin-top: 5px;">Welcome back! Please enter your details.</p>
            </div>
            <div class="formContainer">
                <h2 class="heading">Email</h2>
                <input type="email" id="email" placeholder="Enter your Email" class="input-box">

                <h2 class="heading">Password</h2>
                <input type="password" id="password" placeholder="Enter your Password" class="input-box">
                <button id="loginBtn" class="login-button">Log in</button>
            </div>
            <a href="#" class="forgot-link">Forgot Password</a>
        </div>
    </div>
    
    <script src="first.js"></script>
</body>

</html>
